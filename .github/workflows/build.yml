name: Build and publish pacman repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Chaotic-AUR
        run: |
          pacman-key --init
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm \
            'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' \
            'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'
          printf '\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist\n' >> /etc/pacman.conf

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm base-devel git sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build all packages
        run: |
          mkdir -p /repo
          SRCDIR="$(pwd)"
          # bloom-* apps that land in the bloom pacman repo.
          # petal is NOT built here — it ships via its own upstream installer
          # and is intentionally not a bloom package.
          # Build order: settings/shell/installer/garden land before
          # bloom-desktop (which depends on them as a metapackage).
          for pkg in bloom-settings bloom-shell bloom-installer bloom-garden bloom-desktop; do
            [[ -d "$SRCDIR/$pkg" ]] || { echo "skip: no $pkg/"; continue; }
            echo "==> Building $pkg"
            cp -r "$SRCDIR/$pkg" /tmp/$pkg
            chown -R builder /tmp/$pkg
            sudo -u builder bash -c "cd /tmp/$pkg && makepkg -sf --noconfirm --skippgpcheck"
            mv /tmp/$pkg/*.pkg.tar.zst /repo/ 2>/dev/null || true
            # Install into the builder so later packages can depend on it.
            pacman -U --noconfirm /repo/$pkg-*.pkg.tar.zst 2>/dev/null || true
          done

      - name: Create pacman database
        run: |
          cd /repo
          repo-add bloom.db.tar.gz *.pkg.tar.zst
          ls -lh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /repo
          publish_branch: gh-pages
          force_orphan: false
